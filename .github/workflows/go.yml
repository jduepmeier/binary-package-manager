name: Go

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ">=1.23.0"
          cache: true

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...
